<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5f0eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="drsti.png">
<link rel="apple-touch-icon" href="drsti.png">
<title>Dṛṣṭi Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #faf8f5;
  --bg-warm: #f5f0eb;
  --bg-card: #ffffff;
  --bg-section: #faf6f1;
  --bg-overlay: rgba(250,248,245,0.97);

  --sage: #7a9e7e;
  --sage-dark: #4a6b4e;
  --sage-light: #e8f0e8;
  --sage-mist: #f0f5f0;

  --earth: #8b7355;
  --earth-light: #c4a882;
  --terra: #b07d62;
  --sand: #d4c5b0;

  --text: #2d2a26;
  --text-secondary: #6b6560;
  --text-muted: #9a948d;

  --shadow-xs: 0 1px 2px rgba(45,42,38,0.04);
  --shadow-sm: 0 1px 3px rgba(45,42,38,0.06), 0 1px 2px rgba(45,42,38,0.04);
  --shadow-md: 0 4px 12px rgba(45,42,38,0.08);
  --shadow-lg: 0 8px 24px rgba(45,42,38,0.10);
  --shadow-glow: 0 0 0 3px rgba(122,158,126,0.15);

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-pill: 50px;

  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, system-ui, sans-serif;

  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

html { background: var(--bg); }

body {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── CONFIG OVERLAY ── */
.config-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg-overlay);
  backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  animation: fadeIn 0.6s var(--ease-out);
}
.config-overlay.hidden { display: none; }
.config-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 40px 32px;
  max-width: 400px; width: 100%;
  text-align: center;
}
.config-card h1 {
  font-family: var(--font-display);
  font-size: 36px; font-weight: 300;
  letter-spacing: 0.02em;
  color: var(--sage-dark);
  margin-bottom: 4px;
}
.config-card .subtitle {
  font-size: 12px; color: var(--text-muted);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 32px;
}
.config-card input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--sand);
  border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 14px;
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 12px;
}
.config-card input:focus {
  outline: none;
  border-color: var(--sage);
  box-shadow: var(--shadow-glow);
}
.config-card input::placeholder { color: var(--text-muted); }
.config-card button {
  width: 100%; padding: 13px;
  background: var(--sage-dark);
  color: #fff; border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  margin-top: 8px;
}
.config-card button:active { transform: scale(0.98); }
.config-card button:hover { background: #3d5c40; }

/* ── HEADER ── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-warm);
  border-bottom: 1px solid rgba(45,42,38,0.06);
  padding: 0;
  transition: box-shadow 0.3s;
}
.app-header.scrolled { box-shadow: var(--shadow-md); }

.header-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 6px;
}
.brand {
  font-family: var(--font-display);
  font-size: 28px; font-weight: 300;
  color: var(--sage-dark);
  letter-spacing: 0.02em;
  display: flex; align-items: center; gap: 8px;
}
.brand-logo {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
}
.header-meta {
  font-size: 11px; color: var(--text-muted);
  text-align: right; line-height: 1.4;
  flex-shrink: 0;
}

/* ── TCOT FLOATING BUTTON (bottom-right) ── */
.tcot-fab {
  position: fixed; bottom: 20px; right: 16px; z-index: 90;
  width: 60px; height: 60px;
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 4px 16px rgba(45,42,38,0.18);
  border: 1px solid rgba(45,42,38,0.08);
  transition: filter 0.2s, box-shadow 0.2s, transform 0.15s;
  display: block;
}
.tcot-fab img {
  width: 114%; height: 114%; object-fit: cover; display: block;
  margin: -7% 0 0 -7%;
}
.tcot-fab:hover {
  filter: brightness(1.08);
  box-shadow: 0 6px 24px rgba(45,42,38,0.22);
  transform: translateY(-2px);
}
.tcot-fab:active { transform: scale(0.94); }
.tcot-fab .ext-arrow {
  position: absolute; bottom: 2px; right: 2px;
  width: 14px; height: 14px;
  background: rgba(255,255,255,0.88);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
}
.tcot-fab .ext-arrow svg {
  width: 9px; height: 9px; fill: var(--text-secondary);
}
.sync-status {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.02em;
  padding: 2px 0;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  display: inline-block;
}
.sync-status.synced .sync-dot { background: var(--sage); }
.sync-status.synced { color: var(--sage); }
.sync-status.offline .sync-dot { background: #d4a017; }
.sync-status.offline { color: #b8860b; }
.header-meta .refresh-btn {
  background: none; border: none;
  color: var(--sage); cursor: pointer;
  font-size: 11px; font-family: var(--font-body);
  font-weight: 500; padding: 2px 0;
}
.header-meta .refresh-btn:hover { color: var(--sage-dark); }

/* ── RETREAT BAR ── */
.retreat-bar {
  display: flex; gap: 8px;
  overflow-x: auto; padding: 0 16px 10px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.retreat-bar::-webkit-scrollbar { display: none; }
.retreat-tab {
  flex-shrink: 0;
  background: var(--sage-mist); border: 1.5px solid rgba(122,158,126,0.25);
  border-radius: var(--radius-pill);
  padding: 6px 16px 6px 12px;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  color: var(--sage-dark);
  cursor: pointer; transition: all 0.25s var(--ease-out);
  letter-spacing: 0.01em;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
}
.retreat-tab svg {
  width: 16px; height: 16px; fill: currentColor; flex-shrink: 0;
}
.retreat-tab:hover { border-color: var(--sage); background: var(--sage-light); }
.retreat-tab.active {
  background: var(--sage-dark); color: #fff; border-color: var(--sage-dark);
}

/* ── INVENTORY STRIP ── */
.inv-strip {
  display: flex; gap: 8px;
  overflow-x: auto; padding: 8px 16px 12px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.inv-strip::-webkit-scrollbar { display: none; }

.inv-pill {
  flex-shrink: 0;
  background: var(--bg-card);
  border-radius: var(--radius-pill);
  padding: 6px 14px;
  box-shadow: var(--shadow-xs);
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  border: 1px solid rgba(45,42,38,0.05);
  transition: all 0.3s var(--ease-out);
}
.inv-pill .inv-label {
  color: var(--text-secondary);
  white-space: nowrap;
  font-weight: 400;
}
.inv-pill .inv-nums {
  font-weight: 600;
  color: var(--sage-dark);
  white-space: nowrap;
}
.inv-pill.full {
  background: #fef2f2;
  border-color: rgba(153,0,0,0.1);
}
.inv-pill.full .inv-nums { color: #990000; }
.inv-pill.total-pill {
  background: var(--sage-mist);
  border-color: rgba(122,158,126,0.15);
}
.inv-pill.total-pill .inv-nums { color: var(--sage-dark); font-weight: 700; }

/* ── INLINE SEARCH (compact, inside filter bar) ── */
.search-wrap {
  position: relative; flex-shrink: 0;
  width: 120px;
  transition: width 0.25s var(--ease-out);
}
.search-wrap:focus-within { width: 170px; }
.search-wrap svg {
  position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; fill: var(--text-muted);
  pointer-events: none;
}
.search-input {
  width: 100%; padding: 6px 24px 6px 26px;
  border: 1px solid rgba(45,42,38,0.1);
  border-radius: var(--radius-pill);
  font-family: var(--font-body); font-size: 11px;
  background: var(--bg-card);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s, width 0.2s;
}
.search-input:focus {
  outline: none;
  border-color: var(--sage);
  box-shadow: 0 0 0 2px rgba(122,158,126,0.1);
}
.search-input::placeholder { color: var(--text-muted); font-size: 11px; }
.search-clear {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 13px; padding: 1px 3px;
  display: none; line-height: 1;
}
.search-clear.visible { display: block; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; align-items: center;
  padding: 8px 16px 12px; gap: 8px;
  border-bottom: 1px solid rgba(45,42,38,0.04);
  background: var(--bg);
}
.filter-chips {
  display: flex; gap: 6px;
  overflow-x: auto; flex: 1;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(45,42,38,0.1);
  background: var(--bg-card);
  font-size: 12px; font-weight: 400;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  font-family: var(--font-body);
  white-space: nowrap;
}
.chip:active { transform: scale(0.96); }
.chip.active {
  background: var(--sage);
  color: #fff;
  border-color: var(--sage);
  font-weight: 500;
}
.chip .chip-count {
  font-size: 10px; opacity: 0.7;
  margin-left: 3px;
}
.chip.active .chip-count { opacity: 0.85; }

.sort-select {
  flex-shrink: 0;
  padding: 6px 10px;
  border: 1px solid rgba(45,42,38,0.1);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  font-family: var(--font-body);
  font-size: 12px; color: var(--text-secondary);
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239a948d' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 8px center;
  padding-right: 24px;
}

/* ── CARDS CONTAINER ── */
.cards {
  padding: 8px 12px 80px;
}
.cards-empty {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
  font-size: 14px;
}
.cards-empty .empty-icon { font-size: 32px; margin-bottom: 12px; }

/* ── APPLICANT CARD ── */
.card {
  width: 100%;
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: 0 2px 24px rgba(0,0,0,0.07);
  overflow: hidden;
  position: relative;
  margin-bottom: 10px;
  border: 1px solid rgba(45,42,38,0.04);
  transition: box-shadow 0.3s var(--ease-out), border-color 0.3s;
}
.card.expanded {
  box-shadow: var(--shadow-md);
  border-color: rgba(122,158,126,0.12);
}

/* ── CARD HEADER ── */
.card-header {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
  border-bottom: 1px solid transparent;
}
.card-header:active { background: var(--sage-mist); }
.card.expanded .card-header { border-bottom-color: rgba(45,42,38,0.06); }

.card-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
  flex: 1;
}
.card-header-name { min-width: 0; }
.card-header-name h2 {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-header-name p {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.action-icons {
  display: none;
  gap: 5px;
}
.card.expanded .action-icons { display: flex; }

.action-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 1px solid rgba(45,42,38,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg-card);
  text-decoration: none;
}
.action-icon:hover { background: var(--sage-light); border-color: rgba(122,158,126,0.3); }
.action-icon:active { transform: scale(0.92); }

.action-icon svg {
  width: 13px;
  height: 13px;
  stroke: var(--sage-dark);
  fill: none;
  stroke-width: 2;
}
.action-icon.btn-wa svg { stroke: #25d366; }
.action-icon.btn-ig svg { stroke: #e1306c; }

.status-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.card-collapse-arrow {
  width: 14px;
  height: 14px;
  stroke: var(--text-muted);
  fill: none;
  stroke-width: 2;
  transition: transform 0.25s;
  flex-shrink: 0;
}
.card.expanded .card-collapse-arrow {
  transform: rotate(180deg);
}

/* ── CARD BODY ── */
.card-body {
  display: none;
}
.card.expanded .card-body {
  display: block;
}

/* ── ACCORDIONS ── */
.accordion { border-bottom: 1px solid rgba(45,42,38,0.06); }
.accordion:last-of-type { border-bottom: none; }

.accordion-trigger {
  width: 100%;
  background: none;
  border: none;
  padding: 13px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  text-align: left;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.accordion-trigger:hover { background: var(--sage-mist); }
.accordion-trigger.open { color: var(--sage-dark); background: var(--sage-mist); }

.accordion-arrow {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  transition: transform 0.2s;
  flex-shrink: 0;
  opacity: 0.6;
}
.accordion-trigger.open .accordion-arrow { transform: rotate(90deg); opacity: 1; }

.accordion-body {
  display: none;
  padding: 4px 16px 18px;
  background: var(--sage-mist);
}
.accordion-body.open { display: block; }

/* ── FORM ELEMENTS (inside accordions) ── */
.field { display: flex; flex-direction: column; gap: 5px; }
.field-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.field select, .field input, .field textarea {
  width: 100%;
  padding: 9px 11px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(45,42,38,0.12);
  font-family: var(--font-body);
  font-size: 13px;
  background: var(--bg-card);
  color: var(--text);
  transition: border-color 0.15s;
  outline: none;
}
.field select:focus, .field input:focus, .field textarea:focus {
  border-color: var(--sage);
  box-shadow: var(--shadow-glow);
}
.field textarea { resize: vertical; min-height: 60px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  border-top: 1px solid rgba(45,42,38,0.08);
  border-bottom: 1px solid rgba(45,42,38,0.08);
  margin: 4px 0;
}
.checkbox-row input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--sage-dark);
  flex-shrink: 0;
  cursor: pointer;
}
.checkbox-row label { font-size: 13px; cursor: pointer; }

/* ── OFFER EMAIL SECTION ── */
.offer-email-box {
  background: var(--bg-card);
  border: 1px solid rgba(45,42,38,0.1);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-top: 4px;
}
.offer-email-note {
  padding: 9px 13px;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.5;
}
.offer-email-note.ready {
  color: var(--sage-dark);
  background: var(--sage-light);
}
.offer-email-note.sent {
  color: var(--sage-dark);
  background: var(--sage-light);
}

/* ── STICKY SAVE FOOTER ── */
.save-footer {
  position: sticky;
  bottom: 0;
  background: var(--bg-card);
  border-top: 1px solid rgba(45,42,38,0.06);
  padding: 12px 16px;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.04);
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.save-footer-note {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
  flex: 1;
}
.save-footer-note.has-changes { color: #f39c12; }
.save-footer-note.saved { color: var(--sage); }

.btn-save {
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: rgba(45,42,38,0.08);
  color: var(--text-muted);
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-save.has-changes {
  background: var(--sage-dark);
  color: white;
}
.btn-save.has-changes:hover { background: #3d5c40; }
.btn-save.has-changes:active { transform: scale(0.97); }
.btn-save.saved { background: var(--sage-light); color: var(--sage-dark); cursor: default; }

/* ── QA ROWS (Application Answers) ── */
.qa-row {
  padding: 10px 0;
  border-bottom: 1px solid rgba(45,42,38,0.06);
  font-size: 13px;
}
.qa-row:last-child { border-bottom: none; }
.qa-q {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.7px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 3px;
}
.qa-a {
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}
.qa-a:empty::after { content: '—'; color: var(--text-muted); }

/* ── SYSTEM INFO ROWS ── */
.sysrow {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(45,42,38,0.06);
  font-size: 12px;
}
.sysrow:last-child { border-bottom: none; }
.sysrow-label { color: var(--text-muted); }
.sysrow-value { font-weight: 500; text-align: right; }

/* ── SECTION LABELS & DIVIDERS ── */
.slabel {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.divider { height: 1px; background: rgba(45,42,38,0.08); margin: 12px 0; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px;
  left: 50%; transform: translateX(-50%) translateY(10px);
  padding: 10px 24px;
  border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 500;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s var(--ease-spring);
  font-family: var(--font-body);
  white-space: nowrap;
}
.toast.visible {
  opacity: 1; pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.toast.success { background: var(--sage-dark); color: #fff; }
.toast.error { background: #990000; color: #fff; }
.toast.warning { background: var(--earth); color: #fff; }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg-overlay);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 32px; height: 32px;
  border: 2.5px solid var(--sand);
  border-top-color: var(--sage);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 13px; color: var(--text-muted);
  font-family: var(--font-body);
}

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card { animation: slideUp 0.4s var(--ease-out) both; }
.card:nth-child(1) { animation-delay: 0s; }
.card:nth-child(2) { animation-delay: 0.03s; }
.card:nth-child(3) { animation-delay: 0.06s; }
.card:nth-child(4) { animation-delay: 0.09s; }
.card:nth-child(5) { animation-delay: 0.12s; }
.card:nth-child(6) { animation-delay: 0.15s; }
.card:nth-child(7) { animation-delay: 0.18s; }
.card:nth-child(8) { animation-delay: 0.21s; }

/* ── ADDONS BADGES ── */
.addon-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.addon-badge {
  font-size: 9px; padding: 2px 7px;
  border-radius: var(--radius-pill);
  background: var(--sage-light);
  color: var(--sage-dark);
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* ── MOBILE: FILTER BAR TWO ROWS ── */
@media (max-width: 639px) {
  .filter-bar {
    flex-wrap: wrap;
  }
  .filter-bar .search-wrap {
    flex: 1; width: auto; order: 1;
  }
  .filter-bar .search-wrap:focus-within { width: auto; }
  .filter-bar .sort-select { order: 2; }
  .filter-bar .filter-chips {
    order: 3; width: 100%;
  }
}

/* ── RESPONSIVE ── */
@media (min-width: 640px) {
  .cards { padding: 12px 24px 80px; max-width: 600px; margin: 0 auto; }
  .header-top { padding: 16px 24px 8px; }
  .retreat-bar { padding: 0 24px 10px; }
  .inv-strip { padding: 8px 24px 12px; }
  .filter-bar { padding: 8px 24px 12px; }
  .search-wrap { width: 150px; }
  .search-wrap:focus-within { width: 200px; }
}
</style>
</head>
<body>

  <span class="ext-arrow"><svg viewBox="0 0 24 24"><path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3zM5 5h5V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-5h-2v5H5V5z"/></svg></span>
</a>

</nav>

<!-- CARDS -->
<main class="cards" id="cardsContainer"></main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
var API_URL = 'https://script.google.com/macros/s/AKfycbzxtCn0ZIP_H5THV63naGJbmOhuKTyEcVvk4l4k0Hmz71luTiENikFPLQ69tJmgdq1c/exec';
var DASHBOARD_PASSWORD = 'joyjoyjoy';
var isAuthenticated = localStorage.getItem('drsti_auth') === 'true';
var POLL_INTERVAL = 45000;
var pollTimer = null;
var toastTimer = null;

// ── STATE ──
var state = {
  applicants: [],
  inventory: [],
  lastFetch: null,
  activeFilter: 'all',
  sortBy: 'newest',
  expandedCards: {},
  searchQuery: ''
};

// ── CONSTANTS ──
var STATUSES = [
  'Applied','First Outreach','Hard Yes','Needs Call','Call Scheduled',
  'Waitlist','Not Aligned','Offer Sent','Deposit Paid','Payment Plan',
  'Paid in Full','No Longer Interested','Maybe Next Year','Ghosted',
  'Cancelled','Other'
];

var STATUS_COLORS = {
  'Applied':              {bg:'#cfe2f3',fg:'#1155cc'},
  'First Outreach':       {bg:'#a4c2f4',fg:'#1a44a0'},
  'Hard Yes':             {bg:'#b6d7a8',fg:'#274e13'},
  'Needs Call':           {bg:'#d9ead3',fg:'#38761d'},
  'Call Scheduled':       {bg:'#93c47d',fg:'#274e13'},
  'Waitlist':             {bg:'#fff2cc',fg:'#7f6003'},
  'Not Aligned':          {bg:'#f4cccc',fg:'#990000'},
  'Offer Sent':           {bg:'#d0e0e3',fg:'#0c343d'},
  'Deposit Paid':         {bg:'#a2d9ce',fg:'#0e6251'},
  'Payment Plan':         {bg:'#76d7c4',fg:'#0e6251'},
  'Paid in Full':         {bg:'#45b39d',fg:'#ffffff'},
  'No Longer Interested': {bg:'#e6b8af',fg:'#85200c'},
  'Maybe Next Year':      {bg:'#fce5cd',fg:'#783f04'},
  'Ghosted':              {bg:'#d9d9d9',fg:'#666666'},
  'Cancelled':            {bg:'#ea9999',fg:'#990000'},
  'Other':                {bg:'#1a1a1a',fg:'#ffffff'}
};

var PRICE_TYPES = ['','Payment Plan','Pay Full','EB Plan','EB Full'];

// ── RETREATS (loaded from API) ──
var RETREATS = {};
var RETREAT_IDS = [];
var RETREAT_META = {}; // keyed by retreatId: { config, accommodations, addons, priceTypes }
var activeRetreat = localStorage.getItem('drsti_active_retreat') || '';

function getAccommodations() {
  var meta = RETREAT_META[activeRetreat];
  if (meta && meta.accommodations) {
    var names = [''];
    for (var i = 0; i < meta.accommodations.length; i++) {
      names.push(meta.accommodations[i].name);
    }
    return names;
  }
  return ['','Triple','Double','Glamping']; // fallback
}

async function loadRetreats() {
  var data = await apiGet('getRetreats');
  if (data && data.ok && data.retreats && data.retreats.length > 0) {
    RETREATS = {};
    RETREAT_IDS = [];
    for (var i = 0; i < data.retreats.length; i++) {
      var r = data.retreats[i];
      RETREATS[r.retreatId] = { label: r.label, retreatId: r.retreatId };
      RETREAT_IDS.push(r.retreatId);
    }
    localStorage.setItem('drsti_cache_retreats', JSON.stringify(RETREATS));
  } else {
    var cached = localStorage.getItem('drsti_cache_retreats');
    if (cached) {
      RETREATS = JSON.parse(cached);
      RETREAT_IDS = Object.keys(RETREATS);
    }
    if (RETREAT_IDS.length === 0) {
      RETREATS = { 'tcot-pt-2026': { label: 'Portugal 2026', retreatId: 'tcot-pt-2026' } };
      RETREAT_IDS = ['tcot-pt-2026'];
    }
  }
  if (!activeRetreat || RETREAT_IDS.indexOf(activeRetreat) === -1) {
    activeRetreat = RETREAT_IDS[0];
  }
}

async function loadRetreatMeta(retreatId) {
  var data = await apiGet('getRetreatMeta', retreatId);
  if (data && data.ok) {
    RETREAT_META[retreatId] = {
      config: data.config,
      accommodations: data.accommodations,
      addons: data.addons,
      priceTypes: data.priceTypes
    };
    localStorage.setItem('drsti_cache_meta_' + retreatId, JSON.stringify(RETREAT_META[retreatId]));
  } else {
    var cached = localStorage.getItem('drsti_cache_meta_' + retreatId);
    if (cached) RETREAT_META[retreatId] = JSON.parse(cached);
  }
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', function() {
  if (!isAuthenticated) {
    document.getElementById('configOverlay').classList.remove('hidden');
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('configPassword').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveConfig();
    });
  } else {
    document.getElementById('configOverlay').classList.add('hidden');
    initDashboard();
  }

  // Sticky header shadow
  window.addEventListener('scroll', function() {
    document.getElementById('appHeader').classList.toggle('scrolled', window.scrollY > 4);
  });

  // Pause polling when hidden
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) { stopPolling(); }
    else { startPolling(); flushPendingQueue(); loadAll(); }
  });

  // Register SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
});

async function initDashboard() {
  await loadRetreats();
  renderRetreatBar();
  await loadRetreatMeta(activeRetreat);
  await loadAll();
  startPolling();
}

function saveConfig() {
  var pw = document.getElementById('configPassword').value.trim();
  if (pw !== DASHBOARD_PASSWORD) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  localStorage.setItem('drsti_auth', 'true');
  isAuthenticated = true;
  document.getElementById('configOverlay').classList.add('hidden');
  initDashboard();
}

// ── SYNC STATUS ──
var syncOnline = true;
var pendingQueue = JSON.parse(localStorage.getItem('drsti_pending_queue') || '[]');

function setSyncStatus(online) {
  syncOnline = online;
  var el = document.getElementById('syncStatus');
  if (!el) return;
  if (online && pendingQueue.length === 0) {
    el.className = 'sync-status synced';
    el.innerHTML = '<span class="sync-dot"></span> Synced';
  } else {
    el.className = 'sync-status offline';
    el.innerHTML = '<span class="sync-dot"></span> Offline — ' + pendingQueue.length + ' pending';
  }
}

function savePendingQueue() {
  localStorage.setItem('drsti_pending_queue', JSON.stringify(pendingQueue));
}

async function flushPendingQueue() {
  if (pendingQueue.length === 0) return;
  var remaining = [];
  for (var i = 0; i < pendingQueue.length; i++) {
    var item = pendingQueue[i];
    var result = await apiUpdate(item.action, item.body, true);
    if (!result || !result.ok) {
      remaining.push(item); // Keep failed items
    }
  }
  pendingQueue = remaining;
  savePendingQueue();
  setSyncStatus(remaining.length === 0);
}

// ── API ──
async function apiGet(action, retreatId) {
  try {
    var url = API_URL + '?action=' + action;
    if (retreatId) url += '&retreatId=' + encodeURIComponent(retreatId);
    var resp = await fetch(url);
    var data = await resp.json();
    if (data) {
      setSyncStatus(true);
      flushPendingQueue();
    }
    return data;
  } catch(e) {
    console.error('API GET error:', e);
    setSyncStatus(false);
    return null;
  }
}

async function apiUpdate(action, body, isRetry) {
  // Use GET with URL-encoded JSON payload — POST is unreliable with Apps Script
  try {
    var url = API_URL + '?action=' + action + '&payload=' + encodeURIComponent(JSON.stringify(body));
    var resp = await fetch(url);
    var text = await resp.text();
    try {
      var data = JSON.parse(text);
      setSyncStatus(true);
      return data;
    } catch(parseErr) {
      console.error('API update returned non-JSON:', text.substring(0, 300));
      var match = text.match(/margin:50px[^>]*>([^<]+)/);
      var errMsg = match ? match[1] : 'Server returned an error';
      return { error: errMsg };
    }
  } catch(e) {
    console.error('API update network error:', e);
    if (!isRetry) {
      pendingQueue.push({ action: action, body: body });
      savePendingQueue();
      setSyncStatus(false);
    }
    return null;
  }
}

// ── DATA ──
async function loadAll() {
  var showLoader = state.applicants.length === 0;
  if (showLoader) document.getElementById('loadingOverlay').classList.remove('hidden');

  var rid = activeRetreat;
  var results = await Promise.all([
    apiGet('getApplicants', rid),
    apiGet('getInventory', rid)
  ]);
  var appData = results[0], invData = results[1];

  if (appData && appData.ok) {
    state.applicants = appData.applicants;
    state.lastFetch = appData.ts;
    localStorage.setItem('drsti_cache_app_' + rid, JSON.stringify(appData.applicants));
  } else {
    var c = localStorage.getItem('drsti_cache_app_' + rid);
    if (c) state.applicants = JSON.parse(c);
  }

  if (invData && invData.ok) {
    state.inventory = invData.inventory;
    localStorage.setItem('drsti_cache_inv_' + rid, JSON.stringify(invData.inventory));
  } else {
    var c = localStorage.getItem('drsti_cache_inv_' + rid);
    if (c) state.inventory = JSON.parse(c);
  }

  renderInventory();
  renderFilterChips();
  // Only re-render cards if no card is currently expanded (user not interacting)
  var anyExpanded = Object.keys(state.expandedCards).some(function(k) { return state.expandedCards[k]; });
  if (!anyExpanded) {
    renderRetreatBar();
    renderCards();
  }
  updateLastFetched();
  if (showLoader) document.getElementById('loadingOverlay').classList.add('hidden');
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadAll, POLL_INTERVAL);
}
function stopPolling() { if (pollTimer) clearInterval(pollTimer); }

function updateLastFetched() {
  var el = document.getElementById('lastUpdated');
  if (state.lastFetch) {
    el.textContent = 'Updated ' + timeAgo(state.lastFetch);
  }
}

// ── RENDER: INVENTORY ──
function renderInventory() {
  var strip = document.getElementById('invStrip');
  var html = '';
  var inv = state.inventory;
  for (var i = 0; i < inv.length; i++) {
    var item = inv[i];
    var isTotal = item.item === 'TOTAL PARTICIPANTS';
    var isFull = item.remaining <= 0;
    var cls = 'inv-pill' + (isFull ? ' full' : '') + (isTotal ? ' total-pill' : '');
    var label = isTotal ? 'Total' : item.item.replace(' Sessions','').replace(' Packages','').replace(' Rooms','');
    html += '<div class="'+cls+'">'
      + '<span class="inv-label">'+esc(label)+'</span>'
      + '<span class="inv-nums">'+item.remaining+'/'+item.total+'</span>'
      + '</div>';
  }
  strip.innerHTML = html;
}

// ── RENDER: RETREAT BAR ──
var RETREAT_ICON = '<svg viewBox="0 0 256 256"><path d="M128,16a88.1,88.1,0,0,0-88,88c0,75.3,80,132.17,83.41,134.55a8,8,0,0,0,9.18,0C136,236.17,216,179.3,216,104A88.1,88.1,0,0,0,128,16Zm0,56a32,32,0,1,1-32,32A32,32,0,0,1,128,72Z"/></svg>';
function renderRetreatBar() {
  var bar = document.getElementById('retreatBar');
  var html = '';
  for (var i = 0; i < RETREAT_IDS.length; i++) {
    var id = RETREAT_IDS[i];
    var r = RETREATS[id];
    var active = id === activeRetreat ? ' active' : '';
    html += '<button class="retreat-tab'+active+'" onclick="switchRetreat(\''+id+'\')">'+RETREAT_ICON+esc(r.label)+'</button>';
  }
  bar.innerHTML = html;
}

async function switchRetreat(retreatId) {
  if (retreatId === activeRetreat) return;
  activeRetreat = retreatId;
  localStorage.setItem('drsti_active_retreat', retreatId);
  renderRetreatBar();
  // Load retreat meta if not cached, then reload all data
  if (!RETREAT_META[retreatId]) {
    await loadRetreatMeta(retreatId);
  }
  await loadAll();
  showToast('Switched to ' + (RETREATS[retreatId] ? RETREATS[retreatId].label : retreatId), 'success');
}

// ── RENDER: FILTER CHIPS ──
function renderFilterChips() {
  var container = document.getElementById('filterChips');
  var counts = {};
  STATUSES.forEach(function(s) { counts[s] = 0; });
  state.applicants.forEach(function(a) { if (counts[a.status] !== undefined) counts[a.status]++; });

  var html = '<button class="chip'+(state.activeFilter==='all'?' active':'')+'" onclick="applyFilter(\'all\')">All <span class="chip-count">'+state.applicants.length+'</span></button>';
  STATUSES.forEach(function(s) {
    if (counts[s] === 0) return;
    var active = state.activeFilter === s ? ' active' : '';
    html += '<button class="chip'+active+'" onclick="applyFilter(\''+s+'\')">'+esc(s)+' <span class="chip-count">'+counts[s]+'</span></button>';
  });
  container.innerHTML = html;
}

// ── RENDER: CARDS ──
function renderCards() {
  var container = document.getElementById('cardsContainer');
  var list = getFilteredSorted();

  if (list.length === 0) {
    container.innerHTML = '<div class="cards-empty"><img src="drsti.png" alt="" style="width:48px;height:48px;border-radius:50%;opacity:0.6;margin-bottom:8px">No applicants found</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < list.length; i++) {
    html += renderCard(list[i]);
  }
  container.innerHTML = html;
}

function renderCard(a) {
  var sc = STATUS_COLORS[a.status] || {bg:'#efefef',fg:'#999'};
  var expanded = state.expandedCards[a.row];
  var cardClass = 'card' + (expanded ? ' expanded' : '');
  var name = esc(a.firstName + ' ' + a.lastName);
  var meta = esc(countryName(a.country)) + ' &middot; ' + timeAgo(a.timestamp);

  // Addons
  var addons = [];
  if (a.addonBodywork === 'Yes') addons.push('Bodywork');
  if (a.addonHealing === 'Yes') addons.push('Healing');
  if (a.addonPhotoshoot === 'Yes') addons.push('Photoshoot');
  if (a.addonCoaching === 'Yes') addons.push('Coaching');
  // Also parse addonsJson
  if (a.addonsJson) {
    try {
      var aj = JSON.parse(a.addonsJson);
      for (var ak in aj) { if (aj[ak] && addons.indexOf(ak) === -1) addons.push(ak); }
    } catch(e) {}
  }
  var addonHtml = '';
  if (addons.length) {
    addonHtml = '<div class="addon-badges">' + addons.map(function(x){return '<span class="addon-badge">'+esc(x)+'</span>';}).join('') + '</div>';
  }

  // WhatsApp link
  var waLink = '#';
  if (a.phone) {
    var digits = String(a.phone).replace(/\D/g,'');
    waLink = 'https://wa.me/' + digits;
  }
  var igHandle = a.instagram ? String(a.instagram).replace(/^@/,'') : '';

  // Contact icons (stroke-based SVGs)
  var contactIcons = '';
  if (a.email) contactIcons += '<a href="mailto:'+esc(a.email)+'" class="action-icon" title="Email" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg></a>';
  if (a.phone) contactIcons += '<a href="tel:'+esc(String(a.phone))+'" class="action-icon" title="Call" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.17 10.5 19.79 19.79 0 01.1 1.83 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></a>';
  if (a.phone) contactIcons += '<a href="'+waLink+'" target="_blank" class="action-icon btn-wa" title="WhatsApp" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></a>';
  if (igHandle) contactIcons += '<a href="https://instagram.com/'+esc(igHandle)+'" target="_blank" class="action-icon btn-ig" title="@'+esc(igHandle)+'" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a>';

  // Status select options — grouped
  var STATUS_GROUPS = [
    { label: 'Incoming', statuses: ['Applied','First Outreach'] },
    { label: 'Decision', statuses: ['Hard Yes','Needs Call','Call Scheduled','Waitlist','Not Aligned'] },
    { label: 'Offer', statuses: ['Offer Sent','Deposit Paid'] },
    { label: 'Payment', statuses: ['Payment Plan','Paid in Full'] },
    { label: 'Closed', statuses: ['No Longer Interested','Maybe Next Year','Ghosted','Cancelled','Other'] }
  ];
  var statusOpts = '';
  STATUS_GROUPS.forEach(function(g) {
    statusOpts += '<optgroup label="── '+g.label+' ──">';
    g.statuses.forEach(function(s) {
      statusOpts += '<option value="'+s+'"'+(s===a.status?' selected':'')+'>'+s+'</option>';
    });
    statusOpts += '</optgroup>';
  });

  // Accommodation select
  var accomOpts = '';
  getAccommodations().forEach(function(x) {
    var label = x || '—';
    accomOpts += '<option value="'+x+'"'+(x===a.accommodation?' selected':'')+'>'+label+'</option>';
  });

  // Price type select
  var priceOpts = '';
  PRICE_TYPES.forEach(function(x) {
    var label = x || '—';
    priceOpts += '<option value="'+x+'"'+(x===a.priceType?' selected':'')+'>'+label+'</option>';
  });

  // Offer email status (for Hard Yes / Needs Call)
  var showOfferSection = (a.status === 'Hard Yes' || a.status === 'Needs Call');
  var offerHtml = '';
  if (showOfferSection) {
    var offerReady = a.accommodation && a.priceType;
    var offerSent = !!a.emailSent;
    var noteClass = 'offer-email-note';
    var noteText = '';
    if (offerSent) {
      noteClass += ' sent';
      noteText = '&#10003; Email sent ' + formatDate(a.emailSent);
    } else if (offerReady) {
      noteClass += ' ready';
      noteText = '&#10003; Ready — check Personal Video Sent, then Save to trigger email';
    } else {
      noteText = 'Set accommodation and price type to enable offer email';
    }
    offerHtml = '<div class="divider"></div>'
      + '<div><div class="slabel">Offer Email</div>'
      + '<div class="offer-email-box"><div class="'+noteClass+'">'+noteText+'</div></div></div>';
  }

  // Room preference
  var roomPref = a.roomPlan || a.roomFull || a.roomEB || a.roomEBFull || '—';

  // SVG arrows
  var arrowSvg = '<svg class="accordion-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';
  var collapseArrow = '<svg class="card-collapse-arrow" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>';

  return '<article class="'+cardClass+'" data-row="'+a.row+'" data-status="'+esc(a.status)+'">'

    // ── HEADER ──
    + '<div class="card-header" onclick="toggleCard('+a.row+')">'
    + '<div class="card-header-left">'
    + '<div class="card-header-name">'
    + '<h2>'+name+'</h2>'
    + '<p>'+meta+addonHtml+'</p>'
    + '</div></div>'
    + '<div class="card-header-right">'
    + '<div class="action-icons">'+contactIcons+'</div>'
    + '<div style="display:flex;align-items:center;gap:8px;">'
    + '<div class="status-badge" style="background:'+sc.bg+';color:'+sc.fg+'">'+esc(a.status)+'</div>'
    + collapseArrow
    + '</div></div></div>'

    // ── BODY ──
    + '<div class="card-body">'

    // Overview accordion (open by default when card expands)
    + '<div class="accordion">'
    + '<button class="accordion-trigger open" onclick="toggleAccordion(this)">Overview '+arrowSvg+'</button>'
    + '<div class="accordion-body open">'
    + '<div style="padding-top:14px;display:flex;flex-direction:column;gap:12px;">'
    + '<div class="field"><div class="field-label">Status</div><select id="sel-status-'+a.row+'" onchange="markCardChanged('+a.row+')">'+statusOpts+'</select></div>'
    + '<div class="field-row">'
    + '<div class="field"><div class="field-label">Accommodation</div><select id="sel-accom-'+a.row+'" onchange="markCardChanged('+a.row+')">'+accomOpts+'</select></div>'
    + '<div class="field"><div class="field-label">Price Type</div><select id="sel-price-'+a.row+'" onchange="markCardChanged('+a.row+')">'+priceOpts+'</select></div>'
    + '</div>'
    + '<div class="field"><div class="field-label">Scholarship</div><div style="display:flex;align-items:center;gap:6px;"><span style="font-size:13px;color:var(--text-muted);flex-shrink:0;">€</span><input type="number" id="sel-scholarship-'+a.row+'" min="0" step="50" value="'+(a.scholarship||'')+'" placeholder="0" oninput="markCardChanged('+a.row+')"></div></div>'
    + ((a.status === 'Hard Yes' || a.status === 'Needs Call') ? '<div class="checkbox-row"><input type="checkbox" id="wa-'+a.row+'"'+(a.whatsappSent==='Yes'?' checked':'')+' onchange="markCardChanged('+a.row+')"><label for="wa-'+a.row+'">Personal Video Sent</label></div>' : '')
    + '<div class="field"><div class="field-label">Notes</div><textarea id="sel-notes-'+a.row+'" rows="3" oninput="markCardChanged('+a.row+')" placeholder="Internal notes...">'+esc(a.notes||'')+'</textarea></div>'
    + offerHtml
    + '</div></div></div>'

    // Application Answers accordion (closed)
    + '<div class="accordion">'
    + '<button class="accordion-trigger" onclick="toggleAccordion(this)">Application Answers '+arrowSvg+'</button>'
    + '<div class="accordion-body">'
    + '<div style="padding-top:8px;">'
    + qaRow('What inspired you to apply?', a.inspired)
    + qaRow('Yoga / Spiritual Experience', a.yogaExperience)
    + qaRow('Health Goals', a.healthGoals)
    + qaRow('Injuries / Conditions', a.injuries)
    + qaRow('Food Restrictions', a.foodRestrictions)
    + qaRow('Substances', a.substances)
    + qaRow('Comfortable with digital detox / silence?', a.comfortableWith)
    + qaRow('Questions or Concerns', a.questionsConcerns)
    + qaRow('Additional Info', a.additionalInfo)
    + '</div></div></div>'

    // Room & Payment accordion (closed)
    + '<div class="accordion">'
    + '<button class="accordion-trigger" onclick="toggleAccordion(this)">Room &amp; Payment '+arrowSvg+'</button>'
    + '<div class="accordion-body">'
    + '<div style="padding-top:8px;">'
    + qaRow('Payment Preference', a.paymentPreference)
    + qaRow('Room Selection', roomPref)
    + qaRow('Add-ons Interested', a.addonsInterested || addons.join(', '))
    + qaRow('Travel Assistance', a.travelAssist)
    + qaRow('How They Found Us', a.howHeard)
    + qaRow('Referral', a.referral)
    + '</div></div></div>'

    // System Info accordion (closed)
    + '<div class="accordion">'
    + '<button class="accordion-trigger" onclick="toggleAccordion(this)">System Info '+arrowSvg+'</button>'
    + '<div class="accordion-body">'
    + '<div style="padding-top:8px;">'
    + sysRow('Status Changed', a.statusChangedDate ? formatDate(a.statusChangedDate) : '—')
    + sysRow('Applied', a.timestamp ? formatDate(a.timestamp) : '—')
    + sysRow('Email Sent', a.emailSent ? formatDate(a.emailSent) : '—')
    + sysRow('Ghost Step', a.ghostStep || '0')
    + sysRow('CK Tag', a.ckTag || '—')
    + sysRow('Migration Import', a.migrationImport ? 'Yes' : 'No')
    + '</div></div></div>'

    // Sticky save footer
    + '<div class="save-footer" id="saveFooter-'+a.row+'">'
    + '<span class="save-footer-note" id="saveNote-'+a.row+'">No unsaved changes</span>'
    + '<button class="btn-save" id="saveBtn-'+a.row+'" onclick="saveCardChanges('+a.row+')">Saved</button>'
    + '</div>'

    + '</div></article>';
}

function qaRow(label, text) {
  return '<div class="qa-row"><div class="qa-q">'+esc(label)+'</div><div class="qa-a">'+esc(text||'')+'</div></div>';
}
function sysRow(label, value) {
  return '<div class="sysrow"><span class="sysrow-label">'+esc(label)+'</span><span class="sysrow-value">'+esc(String(value))+'</span></div>';
}

// ── INTERACTIONS ──
function toggleCard(row) {
  state.expandedCards[row] = !state.expandedCards[row];
  var card = document.querySelector('[data-row="'+row+'"]');
  if (card) card.classList.toggle('expanded', state.expandedCards[row]);
}

function toggleAccordion(trigger) {
  var body = trigger.nextElementSibling;
  var isOpen = trigger.classList.contains('open');
  trigger.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}

function markCardChanged(row) {
  var note = document.getElementById('saveNote-' + row);
  var btn = document.getElementById('saveBtn-' + row);
  if (note) { note.textContent = 'Unsaved changes'; note.className = 'save-footer-note has-changes'; }
  if (btn) { btn.textContent = 'Save Changes'; btn.className = 'btn-save has-changes'; }
}

/**
 * Save all changed fields for a card via the Save button.
 * Reads current values from the dropdowns and sends them all at once.
 */
async function saveCardChanges(row) {
  var a = state.applicants.find(function(x){return x.row === row;});
  if (!a) return;

  var statusEl = document.getElementById('sel-status-' + row);
  var accomEl = document.getElementById('sel-accom-' + row);
  var priceEl = document.getElementById('sel-price-' + row);
  var scholarshipEl = document.getElementById('sel-scholarship-' + row);
  var notesEl = document.getElementById('sel-notes-' + row);
  var waEl = document.getElementById('wa-' + row);
  var note = document.getElementById('saveNote-' + row);
  var btn = document.getElementById('saveBtn-' + row);

  var fields = {};
  var newStatus = statusEl ? statusEl.value : a.status;
  var newAccom = accomEl ? accomEl.value : a.accommodation;
  var newPrice = priceEl ? priceEl.value : a.priceType;
  var newScholarship = scholarshipEl ? scholarshipEl.value : (a.scholarship || '');
  var newNotes = notesEl ? notesEl.value : (a.notes || '');
  var newWa = waEl ? (waEl.checked ? 'Yes' : '') : (a.whatsappSent || '');

  if (newStatus !== a.status) fields.status = newStatus;
  if (newAccom !== a.accommodation) fields.accommodation = newAccom;
  if (newPrice !== a.priceType) fields.priceType = newPrice;
  if (newScholarship !== String(a.scholarship || '')) fields.scholarship = newScholarship;
  if (newNotes !== (a.notes || '')) fields.notes = newNotes;
  if (newWa !== (a.whatsappSent || '')) fields.whatsappSent = newWa;

  if (Object.keys(fields).length === 0) {
    showToast('No changes to save', 'warning');
    return;
  }

  // Disable button while saving
  if (btn) { btn.textContent = 'Saving...'; btn.className = 'btn-save has-changes'; btn.disabled = true; }

  // Optimistic update
  for (var k in fields) a[k] = fields[k];

  if (fields.status) {
    var badge = document.querySelector('[data-row="'+row+'"] .status-badge');
    if (badge) {
      var sc = STATUS_COLORS[fields.status] || {bg:'#efefef',fg:'#999'};
      badge.style.background = sc.bg;
      badge.style.color = sc.fg;
      badge.textContent = fields.status;
    }
    var card = document.querySelector('[data-row="'+row+'"]');
    if (card) card.dataset.status = fields.status;
    renderFilterChips();
  }

  var result = await apiUpdate('updateApplicant', { row: row, fields: fields });
  if (result && result.ok) {
    showToast('Changes saved', 'success');
    if (note) { note.textContent = 'All changes saved'; note.className = 'save-footer-note saved'; }
    if (btn) { btn.textContent = 'Saved'; btn.className = 'btn-save saved'; btn.disabled = false; }
    setTimeout(function(){
      if (note) { note.textContent = 'No unsaved changes'; note.className = 'save-footer-note'; }
      if (btn) { btn.textContent = 'Saved'; btn.className = 'btn-save'; }
    }, 2000);
  } else if (result && result.error) {
    showToast('Error: ' + result.error, 'error');
    if (note) { note.textContent = 'Save failed'; note.className = 'save-footer-note has-changes'; }
    if (btn) { btn.textContent = 'Retry'; btn.className = 'btn-save has-changes'; btn.disabled = false; }
  } else if (!result) {
    showToast('Saved offline — will sync when connected', 'warning');
    if (note) { note.textContent = 'Saved offline'; note.className = 'save-footer-note'; }
    if (btn) { btn.textContent = 'Saved'; btn.className = 'btn-save'; btn.disabled = false; }
  }
}

/**
 * Update a single field immediately (used for notes onblur and whatsapp checkbox).
 */
async function updateField(row, field, value) {
  var a = state.applicants.find(function(x){return x.row === row;});
  if (a) a[field] = value;

  var result = await apiUpdate('updateApplicant', { row: row, fields: (function(){var o={};o[field]=value;return o;})() });
  if (result && result.ok) {
    showToast(capitalize(field) + ' updated', 'success');
  } else if (result && result.error) {
    showToast('Error: ' + result.error, 'error');
  } else if (!result) {
    showToast('Saved offline — will sync when connected', 'warning');
  }
}

function applyFilter(filter) {
  state.activeFilter = filter;
  renderFilterChips();
  renderCards();
}

function applySort(sortBy) {
  state.sortBy = sortBy;
  renderCards();
}

function applySearch(query) {
  state.searchQuery = query.trim().toLowerCase();
  var clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.className = 'search-clear' + (query ? ' visible' : '');
  renderCards();
}

function clearSearch() {
  state.searchQuery = '';
  var input = document.getElementById('searchInput');
  if (input) input.value = '';
  var clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.className = 'search-clear';
  renderCards();
}

function getFilteredSorted() {
  var list = state.applicants;
  if (state.activeFilter !== 'all') {
    list = list.filter(function(a){ return a.status === state.activeFilter; });
  }
  if (state.searchQuery) {
    var q = state.searchQuery;
    list = list.filter(function(a){
      var full = (a.firstName + ' ' + a.lastName).toLowerCase();
      return full.indexOf(q) !== -1;
    });
  }
  list = list.slice();
  switch(state.sortBy) {
    case 'newest': list.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);}); break;
    case 'oldest': list.sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);}); break;
    case 'name': list.sort(function(a,b){return (a.firstName+a.lastName).localeCompare(b.firstName+b.lastName);}); break;
    case 'status': list.sort(function(a,b){return STATUSES.indexOf(a.status)-STATUSES.indexOf(b.status);}); break;
  }
  return list;
}

// ── HELPERS ──
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'success') + ' visible';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('visible'); }, 2400);
}

function timeAgo(dateStr) {
  if (!dateStr) return '—';
  var now = Date.now();
  var then = new Date(dateStr).getTime();
  if (isNaN(then)) return '—';
  var diff = now - then;
  var mins = Math.floor(diff/60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins/60);
  if (hrs < 24) return hrs + 'h ago';
  var days = Math.floor(hrs/24);
  if (days < 30) return days + 'd ago';
  var months = Math.floor(days/30);
  return months + 'mo ago';
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr);
  if (isNaN(d.getTime())) return String(dateStr);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function esc(str) {
  if (!str) return '';
  var d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1).replace(/([A-Z])/g, ' $1');
}

var _countryNames = (function(){
  try { return new Intl.DisplayNames(['en'], {type:'region'}); } catch(e) { return null; }
})();
function countryName(val) {
  if (!val) return '—';
  var s = String(val).trim();
  // If it's a 2-letter code, convert it
  if (s.length === 2 && /^[A-Z]{2}$/i.test(s)) {
    if (_countryNames) {
      try { return _countryNames.of(s.toUpperCase()); } catch(e) {}
    }
  }
  return s;
}
</script>
